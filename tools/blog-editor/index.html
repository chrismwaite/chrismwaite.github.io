<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Blog Post Editor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="toolbar">
        <span class="toolbar-title">Blog Post Editor</span>
        <select id="load-select"><option value="">Load post...</option></select>
        <button id="new-btn">New Post</button>
        <button id="upload-btn">Upload Image</button>
        <input type="file" id="upload-input" accept="image/*" hidden />
        <button id="save-btn">Save Post</button>
        <span id="save-status" class="save-status"></span>
    </div>
    <div class="panels">
        <div class="editor-panel">
            <label for="post-title">Title <span id="title-exists" class="exists-label"></span></label>
            <input type="text" id="post-title" placeholder="My Blog Post Title" />

            <div class="row">
                <div class="field">
                    <label for="post-date">Date</label>
                    <input type="date" id="post-date" />
                </div>
                <div class="field slug-field">
                    <label for="post-slug">Slug <span id="slug-exists" class="exists-label"></span></label>
                    <input type="text" id="post-slug" placeholder="auto-generated-from-title" />
                </div>
            </div>

            <label for="post-description">Description <span class="char-count" id="desc-count">0/155</span></label>
            <textarea id="post-description" rows="2" placeholder="Summary for homepage and SEO meta description (~155 chars)"></textarea>

            <label for="post-content">Content <span class="hint">(HTML — press Enter to auto-wrap in &lt;p&gt; tags)</span></label>
            <textarea id="post-content" placeholder="Start typing your blog post..."></textarea>
        </div>
        <div class="preview-panel">
            <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
        </div>
    </div>
    <script src="editor.js"></script>
</body>
</html>
